<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="F1ux CTF blog, writeups, archive, and members." />
    <title>F1ux</title>
    <link rel="icon" href="/assets/f1ux-logo.png" />
    <link rel="stylesheet" href="/styles.css" />
    <script defer src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script defer src="/content-data.js"></script>
    <script defer src="/app.js"></script>
  </head>
  <body data-page="home">
    <header class="site-header" id="top">
      <div class="nav-shell glass-surface">
        <a class="brand" href="/" aria-label="F1ux Blog">
          <span class="brand-mark">
            <img src="/assets/f1ux-logo.png" alt="F1ux" />
          </span>
          <span>
            <strong>F1ux</strong>
          </span>
        </a>

        <nav class="main-nav" aria-label="Primary navigation">
          <a href="/" data-nav="home">Home</a>
          <a href="/writeups/" data-nav="writeups">Writeups</a>
          <a href="/honors/" data-nav="honors">Honors</a>
          <a href="/archive/" data-nav="archive">Archive</a>
          <a href="/members/" data-nav="members">Members</a>
        </nav>

        <div class="nav-actions">
          <a class="icon-button" href="https://github.com/F1uxTeam" aria-label="GitHub">
            <i data-lucide="git-branch"></i>
          </a>
          <a class="icon-button custom-social" href="https://ctftime.org/team/417727" aria-label="CTFtime">
            <span class="social-icon social-ctf" aria-hidden="true"><span></span></span>
          </a>
          <a class="icon-button custom-social" href="https://x.com/F1ux_Team" aria-label="X">
            <span class="social-icon social-x" aria-hidden="true"></span>
          </a>
          <a class="icon-button custom-social" href="mailto:admin@f1ux.team" aria-label="Email">
            <span class="social-icon social-mail" aria-hidden="true"></span>
          </a>
          <button class="icon-button" id="themeToggle" type="button" aria-label="Toggle theme">
            <i data-lucide="sun-medium"></i>
          </button>
        </div>
      </div>
    </header>

    <main class="page-shell about-home">
      <section class="about-hero glass-surface" aria-labelledby="heroTitle">
        <div class="about-mark" aria-hidden="true">
          <img src="/assets/f1ux-logo.png" alt="" />
        </div>
        <div class="about-float-stack" aria-hidden="true">
          <span><i data-lucide="terminal"></i></span>
          <span><i data-lucide="shield"></i></span>
          <span><i data-lucide="radar"></i></span>
        </div>
        <div class="hero-copy-panel about-copy">
          <h1 id="heroTitle">F1ux</h1>
          <p class="hero-lede">
            F1ux，源于“Flux”之意，象征着不断流动的技术与永不停息的探索精神，作为一支新兴战队，F1ux仍在不断壮大与进化。如果有任何招新、商务合作或者技术交流的意向，欢迎联系我们
          </p>
          <div class="hero-actions">
            <a class="primary-action" href="/writeups/">
              <span>Read writeups</span>
              <i data-lucide="arrow-right"></i>
            </a>
            <a class="secondary-action" href="/honors/">
              <i data-lucide="trophy"></i>
              <span>Honors</span>
            </a>
          </div>

          <div class="social-strip glass-surface" aria-label="F1ux social links">
            <a href="https://ctftime.org/team/417727">
              <span class="social-icon social-ctf" aria-hidden="true"><span></span></span>
              <span>CTFtime</span>
            </a>
            <a href="https://x.com/F1ux_Team">
              <span class="social-icon social-x" aria-hidden="true"></span>
              <span>@F1ux_Team</span>
            </a>
            <a href="mailto:admin@f1ux.team">
              <span class="social-icon social-mail" aria-hidden="true"></span>
              <span>admin@f1ux.team</span>
            </a>
          </div>
        </div>
      </section>
    </main>

    <aside class="reader" id="reader" aria-hidden="true">
      <div class="reader-scrim" data-reader-close></div>
      <article class="reader-panel glass-surface" role="dialog" aria-modal="true" aria-labelledby="readerTitle">
        <button class="icon-button reader-close" type="button" data-reader-close aria-label="Close reader">
          <i data-lucide="x"></i>
        </button>
        <div id="readerContent"></div>
      </article>
    </aside>
  </body>
</html>
